name: automind

services:
  postgres:
    image: postgres:16-alpine
    container_name: automind-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      APP_DB_NAME: ${APP_DB_NAME}
      APP_DB_USER: ${APP_DB_USER}
      APP_DB_PASSWORD: ${APP_DB_PASSWORD}
      TZ: ${TZ}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "${POSTGRES_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - automind

  redis:
    image: redis:7-alpine
    container_name: automind-redis
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - automind

  n8n:
    image: n8nio/n8n:latest
    container_name: automind-n8n
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # Хранилище самого n8n
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB}
      DB_POSTGRESDB_USER: ${POSTGRES_USER}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}

      # Сеть / URL
      N8N_HOST: ${N8N_HOST}
      N8N_PORT: 5678
      N8N_PROTOCOL: ${N8N_PROTOCOL}
      WEBHOOK_URL: ${WEBHOOK_URL}
      N8N_EDITOR_BASE_URL: ${WEBHOOK_URL}

      # Безопасность
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      N8N_BASIC_AUTH_ACTIVE: ${N8N_BASIC_AUTH_ACTIVE}
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD}
      N8N_SECURE_COOKIE: "false"      # localhost доступ — без HTTPS на стороне n8n
      N8N_PROXY_HOPS: 1               # Cloudflare Tunnel = 1 хоп

      # Тайм-зона / поведение
      GENERIC_TIMEZONE: ${GENERIC_TIMEZONE}
      TZ: ${TZ}
      N8N_DIAGNOSTICS_ENABLED: "false"
      N8N_VERSION_NOTIFICATIONS_ENABLED: "false"
      N8N_HIRING_BANNER_ENABLED: "false"
      N8N_PERSONALIZATION_ENABLED: "false"
      N8N_RUNNERS_ENABLED: "true"

      # Прикладная БД (доступна из Workflow через credential PostgreSQL)
      APP_DB_HOST: postgres
      APP_DB_PORT: 5432
      APP_DB_NAME: ${APP_DB_NAME}
      APP_DB_USER: ${APP_DB_USER}
      APP_DB_PASSWORD: ${APP_DB_PASSWORD}

      # Redis (доступен через credential Redis)
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}

      # Obsidian (Local REST API на хосте) + Vault git push (Фазы 2-3)
      OBSIDIAN_API_URL: ${OBSIDIAN_API_URL:-http://host.docker.internal:27123}
      VAULT_REMOTE_URL: ${VAULT_REMOTE_URL:-}
      GH_TOKEN_VAULT: ${GH_TOKEN_VAULT:-}

    volumes:
      - n8n_data:/home/node/.n8n
      - ./workflows:/workflows:ro
      - ./db:/db:ro
      # Obsidian Vault (Фаза 3). Если переменная не задана — монтируется
      # пустая папка-плейсхолдер из репо, чтобы compose не падал.
      - ${OBSIDIAN_VAULT_PATH:-./vault-placeholder}:/vault
    ports:
      - "${N8N_PORT}:5678"
    extra_hosts:
      # На Linux нужно явно, на Docker Desktop (Windows/Mac) уже работает по умолчанию.
      - "host.docker.internal:host-gateway"
    networks:
      - automind

  # Опциональный туннель Cloudflare. Закомментирован по умолчанию —
  # большинство пользователей запускают cloudflared.exe прямо на Windows.
  # Если хочешь поднять туннель внутри docker — раскомментируй и добавь
  # CF_TUNNEL_TOKEN в .env.
  # cloudflared:
  #   image: cloudflare/cloudflared:latest
  #   container_name: automind-cloudflared
  #   restart: unless-stopped
  #   command: tunnel --no-autoupdate run
  #   environment:
  #     TUNNEL_TOKEN: ${CF_TUNNEL_TOKEN}
  #   depends_on:
  #     - n8n
  #   networks:
  #     - automind

volumes:
  postgres_data:
  redis_data:
  n8n_data:

networks:
  automind:
    driver: bridge
