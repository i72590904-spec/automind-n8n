apiVersion: 1

datasources:
  - name: Loki
    type: loki
    uid: automind-loki
    access: proxy
    url: http://loki:3100
    isDefault: false
    jsonData:
      maxLines: 1000
      timeout: 60

  - name: Postgres (app)
    type: postgres
    uid: automind-postgres
    access: proxy
    url: postgres:5432
    user: automind
    secureJsonData:
      password: ${GF_DATASOURCE_PG_PASSWORD}
    jsonData:
      database: automind
      sslmode: disable
      postgresVersion: 1600
      timescaledb: false

  - name: Postgres (readonly)
    type: postgres
    uid: automind-postgres-ro
    access: proxy
    url: postgres:5432
    user: automind_ro
    secureJsonData:
      password: ${GF_DATASOURCE_PG_RO_PASSWORD}
    jsonData:
      database: automind
      sslmode: disable
      postgresVersion: 1600
      timescaledb: false
